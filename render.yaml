databases:
  - name: project-tracker-db
    plan: free

services:
  - type: web
    name: project-tracker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-tracker-db
          property: connectionString
