<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Hours EAC Tracker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <h1>📊 Project Hours EAC Tracker</h1>
  </div>
  <div class="topbar-right">
    <button id="btnDashboard" class="nav-btn active">Dashboard</button>
    <button id="btnAddProject" class="btn primary">+ Add Project</button>
  </div>
</header>

<div class="toolbar">
  <button id="btnExportExcel" class="btn">⬇ Export Excel</button>
  <button id="btnExportPdf" class="btn">⬇ Export PDF</button>
  <button id="btnExportJson" class="btn">⬇ Export JSON</button>
  <label class="btn file-btn">
    ⬆ Import JSON
    <input type="file" id="fileImport" accept="application/json" hidden>
  </label>
  <button id="btnReset" class="btn danger">⟲ Reset All Data</button>
</div>

<main id="app">

  <!-- ============ DASHBOARD VIEW ============ -->
  <section id="dashboardView" class="view">
    <h2>All Projects</h2>
    <div class="table-wrap">
      <table id="dashboardTable">
        <thead>
          <tr>
            <th>Project Name</th>
            <th>Total Planned Hours</th>
            <th>Total Actual Hours</th>
            <th>Percent Complete</th>
            <th>Total EAC</th>
            <th>Variance</th>
            <th>Status</th>
            <th>Open</th>
          </tr>
        </thead>
        <tbody id="dashboardBody"></tbody>
      </table>
    </div>
  </section>

  <!-- ============ PROJECT DETAIL VIEW ============ -->
  <section id="projectView" class="view hidden">
    <div class="project-header">
      <button id="btnBack" class="btn">← Back to Dashboard</button>
      <div class="project-title-wrap">
        <input id="projectNameInput" class="project-title-input" />
      </div>
      <button id="btnDeleteProject" class="btn danger small">🗑 Delete Project</button>
    </div>

    <div class="summary-cards" id="summaryCards"></div>

    <div class="table-wrap">
      <table id="phasesTable">
        <thead>
          <tr>
            <th>Group</th>
            <th>Task</th>
            <th>Planned Hours<br><span class="sub">(BAC)</span></th>
            <th>Actual Hours<br><span class="sub">(AC)</span></th>
            <th>% Complete</th>
            <th>ETC</th>
            <th>Earned Hours<br><span class="sub">(EV)</span></th>
            <th>CPI</th>
            <th>EAC<br><span class="sub">Method 1</span></th>
            <th>EAC<br><span class="sub">Method 2</span></th>
            <th>EAC<br><span class="sub">Method 3</span></th>
            <th>Variance</th>
          </tr>
        </thead>
        <tbody id="phasesBody"></tbody>
      </table>
    </div>

    <div class="notes-wrap">
      <label for="notesArea"><strong>Notes</strong></label>
      <textarea id="notesArea" placeholder="Add notes about this project..."></textarea>
    </div>
  </section>

</main>

<div id="toast" class="toast hidden"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
